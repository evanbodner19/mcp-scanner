name: Build & Release GUI

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to attach the release asset to (e.g. v5.0.0)"
        required: false

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os_label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            os_label: windows
            arch: x86_64
            asset: MCP-Scanner-windows-x86_64.zip
          - runner: macos-latest
            os_label: macos
            arch: arm64
            asset: MCP-Scanner-macos-arm64.zip
          - runner: ubuntu-latest
            os_label: linux
            arch: x86_64
            asset: MCP-Scanner-linux-x86_64.zip
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[gui]"
          pip install pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller mcp-scanner-gui.spec

      - name: Zip (Windows)
        if: matrix.os_label == 'windows'
        shell: pwsh
        run: Compress-Archive -Path "dist\MCP Scanner\*" -DestinationPath "dist\${{ matrix.asset }}"

      - name: Zip (Unix)
        if: matrix.os_label != 'windows'
        run: |
          cd "dist/MCP Scanner"
          zip -r "../${{ matrix.asset }}" .

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums.txt
        run: |
          cd artifacts
          sha256sum MCP-Scanner-*.zip > checksums.txt
          cat checksums.txt

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || inputs.tag }}
          name: "MCP Scanner ${{ github.ref_name || inputs.tag }}"
          body: |
            ## MCP Scanner ${{ github.ref_name || inputs.tag }} — standalone browser GUI

            No Python installation required.

            **Install:**
            1. Download the zip for your OS (`MCP-Scanner-<os>-<arch>.zip`).
            2. Unzip anywhere.
            3. Run `MCP Scanner` — it opens in your default browser.

            Auto-update is built in: launch checks GitHub Releases and offers to update.

            `checksums.txt` contains SHA-256 sums for each asset (used by the updater).
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            artifacts/MCP-Scanner-*.zip
            artifacts/checksums.txt
